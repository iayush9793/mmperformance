<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* Preloader Styles */
        #preloader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .preloader-logo {
            width: 200px; /* Large Logo */
            margin-bottom: 32px;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4));
        }

        .loader-bar-container {
            width: 280px;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--primary);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.4);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .hidden { display: none !important; }

        .status-pill {
            padding: 4px 12px;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid transparent;
        }

        .view-transition {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }

        input, select {
            background-color: #1e293b !important;
            border-color: #334155 !important;
            color: white !important;
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <img src="https://image.s7.sfmc-content.com/lib/fe3e11717d64057d751472/m/1/2ddd9d88-4661-43a5-bf8f-809065b48367.png" alt="Logo" class="preloader-logo">
        <div id="progress-text" class="text-xs font-bold text-slate-400 mb-2 tracking-[0.2em]">INITIALIZING PERFORMANCE TRACKER 0%</div>
        <div class="loader-bar-container">
            <div id="loader-fill" class="loader-bar-fill"></div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="min-h-screen pb-12 hidden">
        <header class="sticky top-0 z-40 w-full bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between">
                <div class="flex items-center gap-6" onclick="showView('dashboard')" style="cursor:pointer">
                    <img src="https://image.s7.sfmc-content.com/lib/fe3e11717d64057d751472/m/1/2ddd9d88-4661-43a5-bf8f-809065b48367.png" alt="Logo" class="h-14 w-auto">
                    <span class="font-bold text-white hidden md:block tracking-tight text-2xl">Performance Tracker</span>
                </div>
                
                <h1 id="page-title" class="text-lg font-semibold text-slate-200 absolute left-1/2 -translate-x-1/2 hidden xl:block">
                    Today's Performance Overview
                </h1>

                <div class="flex items-center gap-4">
                    <div id="top-revenue-badge" class="hidden lg:flex items-center bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full text-xs font-bold border border-emerald-500/20">
                        TOP REVENUE: <span id="top-et-name" class="ml-1 text-white">Loading...</span>
                    </div>
                    <button onclick="showView('form')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg shadow-indigo-600/20 transition-all active:scale-95">
                        Update Performance
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            <!-- Dashboard -->
            <section id="view-dashboard" class="view-transition">
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                <div class="mt-12 flex justify-center">
                    <button onclick="showView('details')" class="flex items-center gap-2 text-indigo-400 font-bold hover:text-indigo-300 transition-colors py-3 px-8 rounded-full bg-indigo-500/5 border border-indigo-500/20">
                        Detailed Performance Analytics
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>
                </div>
            </section>

            <!-- Update Form -->
            <section id="view-form" class="view-transition hidden max-w-2xl mx-auto">
                <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
                    <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                        <h2 class="text-xl font-bold text-white">Update Performance</h2>
                        <button onclick="showView('dashboard')" class="text-slate-400 hover:text-white transition-colors">✕</button>
                    </div>
                    <form id="performance-form" class="p-6 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">ET Account</label>
                                <select id="form-et-name" required class="w-full rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-indigo-500"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Date</label>
                                <input type="date" id="form-date" required class="w-full rounded-lg p-2.5 border outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" step="0.01" id="form-low-or" placeholder="Lowest OR %" required class="rounded-lg p-2.5 border">
                            <input type="number" step="0.01" id="form-high-or" placeholder="Highest OR %" required class="rounded-lg p-2.5 border">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" step="0.01" id="form-low-del" placeholder="Lowest Del %" required class="rounded-lg p-2.5 border">
                            <input type="number" step="0.01" id="form-high-del" placeholder="Highest Del %" required class="rounded-lg p-2.5 border">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="form-del-down" placeholder="Del Mails Down" required class="rounded-lg p-2.5 border">
                            <input type="number" id="form-or-down" placeholder="OR Mails Down" required class="rounded-lg p-2.5 border">
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" step="0.01" id="form-revenue" placeholder="Revenue $" required class="rounded-lg p-2.5 border font-bold text-emerald-400">
                            <input type="number" step="0.1" id="form-threshold" placeholder="Threshold %" value="85" required class="rounded-lg p-2.5 border">
                        </div>
                        <input type="text" id="form-del-range" placeholder="Delivery Range (e.g. 90-100%)" class="w-full rounded-lg p-2.5 border outline-none">
                        <div class="pt-6 flex gap-3">
                            <button type="button" onclick="showView('dashboard')" class="flex-1 py-3 bg-slate-700 text-slate-300 rounded-lg font-bold">Cancel</button>
                            <button type="submit" id="submit-btn" class="flex-1 py-3 bg-indigo-600 text-white rounded-lg font-bold">Save Performance</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Analytics -->
            <section id="view-details" class="view-transition hidden">
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6">
                    <div>
                        <h2 class="text-3xl font-bold text-white">Performance Analytics</h2>
                        <p class="text-slate-400 mt-1">Multi-day performance trend tracking</p>
                    </div>
                    <select id="details-et-filter" onchange="renderDetails()" class="rounded-lg border-slate-700 p-2 border bg-slate-800 text-white font-bold outline-none"></select>
                </div>
                <div id="today-detail-stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Open Rate Trend (%)</h3>
                        <div class="chart-container"><canvas id="chart-or"></canvas></div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Delivery Trend (%)</h3>
                        <div class="chart-container"><canvas id="chart-delivery"></canvas></div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Mails Down Trend</h3>
                        <div class="chart-container"><canvas id="chart-mails"></canvas></div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Overall Perf Score</h3>
                        <div class="chart-container"><canvas id="chart-overall"></canvas></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- PRELOADER START (Run immediately to prevent 0% stick) ---
        const preloader = document.getElementById('preloader');
        const progressText = document.getElementById('progress-text');
        const loaderFill = document.getElementById('loader-fill');
        const mainApp = document.getElementById('app');

        function startPreloader() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        preloader.classList.add('opacity-0');
                        setTimeout(() => {
                            preloader.style.visibility = 'hidden';
                            mainApp.classList.remove('hidden');
                        }, 500);
                    }, 400);
                }
                progressText.innerText = `INITIALIZING PERFORMANCE TRACKER ${progress}%`;
                loaderFill.style.width = `${progress}%`;
            }, 50);
        }
        startPreloader();

        // --- FIREBASE SETUP ---
        let firebaseConfig = {};
        try {
            // Check if environment variables exist, otherwise fallback to empty to prevent crash
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "", authDomain: "", projectId: "", storageBucket: "", messagingSenderId: "", appId: ""
            };
        } catch (e) {
            console.warn("Firebase config missing or invalid.");
        }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'et-performance-tracker';
        const ET_LIST = ["JSG30", "JSG38N", "JSG34", "JSG36", "JSG 38", "JSG 40", "JSG 41", "JSG 43", "JSG 45", "JSG 47", "JSG 48", "JSG 51", "JSG 52", "JSG 53", "JSG 26", "JSG 34C"].sort();

        let appData = [];
        let charts = {};
        let auth, db;

        // Initialize Firebase safely
        try {
            const firebaseApp = initializeApp(firebaseConfig);
            auth = getAuth(firebaseApp);
            db = getFirestore(firebaseApp);
        } catch (e) {
            console.error("Firebase Initialization Failed:", e);
        }

        // --- LOGIC ---
        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const formatDate = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        const populateSelects = () => {
            const f = document.getElementById('form-et-name');
            const d = document.getElementById('details-et-filter');
            ET_LIST.forEach(et => {
                f.innerHTML += `<option value="${et}">${et}</option>`;
                d.innerHTML += `<option value="${et}">${et}</option>`;
            });
        };

        const calculateScore = (e) => ((0.4 * ((e.lowestOR + e.highestOR)/2)) + (0.4 * ((e.lowestDelivery + e.highestDelivery)/2)) - (0.2 * e.mailsDown));

        async function loadData() {
            if (!auth.currentUser || !db) return;
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'performance'));
                appData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                appData.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderDashboard();
                updateTopET();
            } catch (e) { console.error("Fetch Error:", e); }
        }

        function renderDashboard() {
            const grid = document.getElementById('cards-grid');
            const today = getTodayStr();
            grid.innerHTML = '';

            ET_LIST.forEach(et => {
                const todayEntry = appData.find(d => d.etName === et && d.date === today);
                const entry = todayEntry || appData.find(d => d.etName === et);

                if (!entry) {
                    grid.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl text-center flex flex-col justify-center h-56 border-dashed border-slate-700">
                            <div class="text-slate-600 mb-2">NO PERFORMANCE RECORD</div>
                            <h3 class="text-lg font-bold text-slate-400">${et}</h3>
                            <button onclick="openFormFor('${et}')" class="mt-4 text-xs font-bold text-indigo-400">ADD PERFORMANCE</button>
                        </div>`;
                    return;
                }

                const low = entry.lowestOR < entry.threshold || entry.lowestDelivery < entry.threshold;
                const statusClass = low ? 'text-rose-400 bg-rose-400/10 border-rose-400/20' : 'text-emerald-400 bg-emerald-400/10 border-emerald-400/20';

                grid.innerHTML += `
                    <div class="glass-card p-5 rounded-2xl group cursor-pointer" onclick="viewDetailedET('${entry.etName}')">
                        <div class="flex justify-between items-start mb-4">
                            <div><h3 class="text-lg font-bold text-white group-hover:text-indigo-300 transition-colors">${entry.etName}</h3><p class="text-[10px] text-slate-500 font-black uppercase">${entry.date === today ? 'LIVE' : formatDate(entry.date)}</p></div>
                            <span class="status-pill border ${statusClass}">${low ? 'LOW' : 'GOOD'}</span>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><p class="text-[9px] text-slate-500 font-black mb-1">OR %</p><p class="text-sm font-bold ${entry.lowestOR < entry.threshold ? 'text-rose-400' : 'text-slate-200'}">${entry.lowestOR}%</p></div>
                            <div><p class="text-[9px] text-slate-500 font-black mb-1">DEL %</p><p class="text-sm font-bold ${entry.lowestDelivery < entry.threshold ? 'text-rose-400' : 'text-slate-200'}">${entry.lowestDelivery}%</p></div>
                            <div><p class="text-[9px] text-slate-500 font-black mb-1">MAILS DOWN</p><p class="text-sm font-bold">${entry.mailsDown}</p></div>
                            <div><p class="text-[9px] text-slate-500 font-black mb-1">REVENUE</p><p class="text-sm font-bold text-emerald-400">$${entry.revenue.toLocaleString()}</p></div>
                        </div>
                        <div class="mt-4 pt-3 border-t border-slate-700/50 flex justify-between items-center opacity-40 group-hover:opacity-100">
                            <span class="text-[10px] font-bold text-slate-500">SCORE: ${calculateScore(entry).toFixed(1)}</span>
                            <span class="text-[10px] font-bold text-indigo-400 uppercase">Trends →</span>
                        </div>
                    </div>`;
            });
        }

        function updateTopET() {
            const today = getTodayStr();
            const todayEntries = appData.filter(d => d.date === today);
            if (todayEntries.length > 0) {
                const top = [...todayEntries].sort((a, b) => b.revenue - a.revenue)[0];
                document.getElementById('top-et-name').innerText = `${top.etName} ($${top.revenue.toLocaleString()})`;
                document.getElementById('top-revenue-badge').classList.remove('hidden');
            }
        }

        window.showView = (view) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if (view === 'details') renderDetails();
            window.scrollTo(0,0);
        };

        window.openFormFor = (et) => {
            document.getElementById('form-et-name').value = et;
            document.getElementById('form-date').value = getTodayStr();
            showView('form');
        };

        window.viewDetailedET = (et) => {
            document.getElementById('details-et-filter').value = et;
            showView('details');
        };

        document.getElementById('performance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = 'SAVING...';
            const etName = document.getElementById('form-et-name').value;
            const entry = {
                etName, date: document.getElementById('form-date').value,
                lowestOR: parseFloat(document.getElementById('form-low-or').value),
                highestOR: parseFloat(document.getElementById('form-high-or').value),
                lowestDelivery: parseFloat(document.getElementById('form-low-del').value),
                highestDelivery: parseFloat(document.getElementById('form-high-del').value),
                mailsDown: parseInt(document.getElementById('form-del-down').value),
                orMailsDown: parseInt(document.getElementById('form-or-down').value),
                revenue: parseFloat(document.getElementById('form-revenue').value),
                threshold: parseFloat(document.getElementById('form-threshold').value),
                deliveryRange: document.getElementById('form-del-range').value,
                createdAt: new Date().toISOString()
            };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'performance', `${entry.etName}_${entry.date}`), entry);
                await loadData();
                showView('dashboard');
                e.target.reset();
            } catch (err) { console.error(err); }
            finally { btn.disabled = false; btn.innerText = 'Save Performance'; }
        });

        function renderDetails() {
            const et = document.getElementById('details-et-filter').value;
            const history = appData.filter(d => d.etName === et).slice(0, 10).reverse();
            const today = history.find(d => d.date === getTodayStr());
            const stats = document.getElementById('today-detail-stats');
            
            if (today) {
                stats.innerHTML = `
                    <div class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-xl"><p class="text-[10px] text-indigo-400 uppercase font-black">Score</p><p class="text-2xl font-bold">${calculateScore(today).toFixed(1)}</p></div>
                    <div class="bg-emerald-500/10 border border-emerald-500/20 p-4 rounded-xl"><p class="text-[10px] text-emerald-400 uppercase font-black">Revenue</p><p class="text-2xl font-bold">$${today.revenue}</p></div>
                    <div class="bg-slate-700/30 p-4 rounded-xl"><p class="text-[10px] text-slate-500 uppercase font-black">Avg OR</p><p class="text-xl font-bold">${((today.lowestOR+today.highestOR)/2).toFixed(1)}%</p></div>
                    <div class="bg-slate-700/30 p-4 rounded-xl"><p class="text-[10px] text-slate-500 uppercase font-black">Down</p><p class="text-xl font-bold">${today.mailsDown}</p></div>`;
            } else { stats.innerHTML = `<div class="col-span-4 py-8 text-center text-slate-500 font-bold border border-dashed border-slate-700 rounded-xl">NO PERFORMANCE DATA TODAY</div>`; }

            const labels = history.map(d => formatDate(d.date));
            const datasets = [
                { id: 'chart-or', label: 'OR %', data: history.map(d => (d.lowestOR + d.highestOR)/2), color: '#6366f1' },
                { id: 'chart-delivery', label: 'Del %', data: history.map(d => (d.lowestDelivery + d.highestDelivery)/2), color: '#22c55e' },
                { id: 'chart-mails', label: 'Mails', data: history.map(d => d.mailsDown), color: '#f59e0b' },
                { id: 'chart-overall', label: 'Score', data: history.map(d => calculateScore(d)), color: '#ec4899' }
            ];

            datasets.forEach(ds => {
                if (charts[ds.id]) charts[ds.id].destroy();
                charts[ds.id] = new Chart(document.getElementById(ds.id).getContext('2d'), {
                    type: 'line',
                    data: { labels, datasets: [{ data: ds.data, borderColor: ds.color, backgroundColor: ds.color+'15', fill: true, tension: 0.4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
                });
            });
        }

        window.addEventListener('load', async () => {
            populateSelects();
            if (auth) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                else await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => { if (user) loadData(); });
            }
        });
    </script>
</body>
</html>
