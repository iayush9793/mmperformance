<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ET Performance Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #6366f1;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        #preloader {
            position: fixed;
            inset: 0;
            background: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        .preloader-logo {
            width: 220px;
            margin-bottom: 32px;
            filter: drop-shadow(0 0 15px rgba(99, 102, 241, 0.4));
        }

        .loader-bar-container {
            width: 280px;
            height: 6px;
            background: #1e293b;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-bar-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--primary);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            border-radius: 24px;
        }

        .glass-card:hover {
            transform: translateY(-4px);
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        .hidden { display: none !important; }

        .view-transition {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
        }

        input, select, textarea {
            background-color: #1e293b !important;
            border: 1px solid #334155 !important;
            color: white !important;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #94a3b8;
            font-weight: 600;
            font-size: 0.875rem;
            transition: color 0.2s;
            cursor: pointer;
        }

        .back-btn:hover {
            color: white;
        }

        .date-input-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        
        .date-input-group label {
            font-size: 10px;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .edit-link {
            font-size: 11px;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 4px 8px;
            border-radius: 6px;
            background: rgba(99, 102, 241, 0.1);
            transition: all 0.2s;
        }

        .edit-link:hover {
            background: rgba(99, 102, 241, 0.2);
            color: white;
        }
    </style>
</head>
<body>

    <!-- Preloader -->
    <div id="preloader">
        <img src="https://image.s7.sfmc-content.com/lib/fe3e11717d64057d751472/m/1/2ddd9d88-4661-43a5-bf8f-809065b48367.png" alt="Logo" class="preloader-logo">
        <div id="progress-text" class="text-xs font-bold text-slate-400 mb-2 tracking-[0.2em]">LOADING PERFORMANCE 0%</div>
        <div class="loader-bar-container">
            <div id="loader-fill" class="loader-bar-fill"></div>
        </div>
    </div>

    <!-- App Container -->
    <div id="app" class="min-h-screen pb-12 hidden">
        <header class="sticky top-0 z-40 w-full bg-slate-900/80 backdrop-blur-md border-b border-slate-800">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-24 flex items-center justify-between">
                <div class="flex items-center gap-6" onclick="showView('dashboard')" style="cursor:pointer">
                    <img src="https://image.s7.sfmc-content.com/lib/fe3e11717d64057d751472/m/1/2ddd9d88-4661-43a5-bf8f-809065b48367.png" alt="Logo" class="h-14 w-auto">
                    <span class="font-bold text-white hidden md:block tracking-tight text-2xl">Performance Tracker</span>
                </div>
                
                <div class="hidden xl:flex flex-col items-center gap-1 absolute left-1/2 -translate-x-1/2">
                   <span class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Dashboard Date</span>
                   <input type="date" id="dashboard-date-picker" onchange="renderDashboard()" class="bg-transparent border-none text-white font-bold text-lg p-0 cursor-pointer outline-none">
                </div>

                <div class="flex items-center gap-4">
                    <div id="top-revenue-badge" class="hidden lg:flex items-center bg-emerald-500/10 text-emerald-400 px-3 py-1.5 rounded-full text-xs font-bold border border-emerald-500/20">
                        TOP REVENUE: <span id="top-et-name" class="ml-1 text-white">Loading...</span>
                    </div>
                    <button onclick="showView('form')" class="bg-indigo-600 hover:bg-indigo-500 text-white px-5 py-2.5 rounded-lg text-sm font-bold shadow-lg shadow-indigo-600/20 transition-all active:scale-95">
                        Update Performance
                    </button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
            
            <!-- Dashboard -->
            <section id="view-dashboard" class="view-transition">
                <div id="cards-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6"></div>
                <div class="mt-12 flex justify-center">
                    <button onclick="showView('details')" class="flex items-center gap-2 text-indigo-400 font-bold hover:text-indigo-300 transition-colors py-3 px-8 rounded-full bg-indigo-500/5 border border-indigo-500/20">
                        Detailed Performance Analytics
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14m-7-7 7 7-7 7"/></svg>
                    </button>
                </div>
            </section>

            <!-- Update Form -->
            <section id="view-form" class="view-transition hidden max-w-2xl mx-auto">
                <div class="mb-6">
                    <button onclick="showView('dashboard')" class="back-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        Back to Dashboard
                    </button>
                </div>
                <div class="bg-slate-800 rounded-2xl shadow-2xl border border-slate-700 overflow-hidden">
                    <div class="p-6 border-b border-slate-700 flex justify-between items-center">
                        <h2 class="text-xl font-bold text-white">Update Performance</h2>
                    </div>
                    <form id="performance-form" class="p-6 space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">ET Account</label>
                                <select id="form-et-name" required class="w-full rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-indigo-500"></select>
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Date</label>
                                <input type="date" id="form-date" required class="w-full rounded-lg p-2.5 border outline-none">
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Open Rate Range</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" step="0.01" id="form-low-or" placeholder="Low %" required class="rounded-lg p-2.5 border">
                                    <input type="number" step="0.01" id="form-high-or" placeholder="High %" required class="rounded-lg p-2.5 border">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Delivery Range</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" step="0.01" id="form-low-del" placeholder="Low %" required class="rounded-lg p-2.5 border">
                                    <input type="number" step="0.01" id="form-high-del" placeholder="High %" required class="rounded-lg p-2.5 border">
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Mails Down</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" id="form-del-down" placeholder="Del Down" required class="rounded-lg p-2.5 border">
                                    <input type="number" id="form-or-down" placeholder="OR Down" required class="rounded-lg p-2.5 border">
                                </div>
                            </div>
                            <div>
                                <label class="block text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1 ml-1">Revenue & Threshold</label>
                                <div class="grid grid-cols-2 gap-2">
                                    <input type="number" step="0.01" id="form-revenue" placeholder="Revenue $" class="rounded-lg p-2.5 border font-bold text-emerald-400">
                                    <input type="number" step="0.1" id="form-threshold" placeholder="Threshold %" value="85" required class="rounded-lg p-2.5 border">
                                </div>
                            </div>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Notes</label>
                            <textarea id="form-notes" rows="3" placeholder="Add performance notes here..." class="w-full rounded-lg p-2.5 border outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
                        </div>
                        <div class="pt-6 flex gap-3">
                            <button type="submit" id="submit-btn" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold transition-all hover:bg-indigo-500">Save Performance</button>
                        </div>
                    </form>
                </div>
            </section>

            <!-- Analytics -->
            <section id="view-details" class="view-transition hidden">
                <div class="mb-6">
                    <button onclick="showView('dashboard')" class="back-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                        Back to Dashboard
                    </button>
                </div>
                <div class="flex flex-col lg:flex-row justify-between items-start lg:items-end mb-8 gap-6">
                    <div class="space-y-1">
                        <h2 class="text-3xl font-bold text-white">Performance Analytics</h2>
                        <p class="text-slate-400">Custom range performance trend tracking</p>
                    </div>
                    
                    <div class="flex flex-wrap items-end gap-4 bg-slate-800/40 p-4 rounded-2xl border border-slate-700/50 w-full lg:w-auto">
                        <div class="date-input-group">
                            <label>Account</label>
                            <select id="details-et-filter" onchange="renderDetails()" class="rounded-lg border-slate-700 px-3 py-2 bg-slate-800 text-white font-bold outline-none min-w-[140px]"></select>
                        </div>
                        <div class="date-input-group">
                            <label>Start Date</label>
                            <input type="date" id="details-start-date" onchange="renderDetails()" class="rounded-lg px-3 py-2 outline-none">
                        </div>
                        <div class="date-input-group">
                            <label>End Date</label>
                            <input type="date" id="details-end-date" onchange="renderDetails()" class="rounded-lg px-3 py-2 outline-none">
                        </div>
                    </div>
                </div>

                <div id="today-detail-stats" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>
                
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Open Rate Trend (%)</h3>
                        <div class="chart-container"><canvas id="chart-or"></canvas></div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Delivery Trend (%)</h3>
                        <div class="chart-container"><canvas id="chart-delivery"></canvas></div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">OR Mails Down Trend</h3>
                        <div class="chart-container"><canvas id="chart-mails"></canvas></div>
                    </div>
                    <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
                        <h3 class="text-xs font-black text-slate-500 uppercase tracking-widest mb-6">Revenue Trend ($)</h3>
                        <div class="chart-container"><canvas id="chart-overall"></canvas></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const preloader = document.getElementById('preloader');
        const progressText = document.getElementById('progress-text');
        const loaderFill = document.getElementById('loader-fill');
        const mainApp = document.getElementById('app');

        const getTodayStr = () => new Date().toISOString().split('T')[0];
        const formatDate = (d) => new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

        function startPreloader() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.floor(Math.random() * 10) + 5;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        preloader.classList.add('opacity-0');
                        setTimeout(() => {
                            preloader.style.visibility = 'hidden';
                            mainApp.classList.remove('hidden');
                        }, 500);
                    }, 400);
                }
                progressText.innerText = `LOADING PERFORMANCE ${progress}%`;
                loaderFill.style.width = `${progress}%`;
            }, 50);
        }
        startPreloader();

        const firebaseConfig = {
            apiKey: "AIzaSyBhW8h3qZaav9NCLMKlJxLMxfX7mkUZqaQ",
            authDomain: "mmperform-6c550.firebaseapp.com",
            projectId: "mmperform-6c550",
            storageBucket: "mmperform-6c550.firebasestorage.app",
            messagingSenderId: "76075681940",
            appId: "1:76075681940:web:afad788dc3f87843330c81",
            measurementId: "G-PD286TETH3"
        };

        const appId = 'mm-performance-tracker';
        const ET_LIST = ["JSG30", "JSG38N", "JSG34", "JSG36", "JSG 38", "JSG 40", "JSG 41", "JSG 43", "JSG 45", "JSG 47", "JSG 48", "JSG 51", "JSG 52", "JSG 53", "JSG 26", "JSG 34C"].sort();

        let appData = [];
        let charts = {};
        let auth, db;

        try {
            const firebaseApp = initializeApp(firebaseConfig);
            auth = getAuth(firebaseApp);
            db = getFirestore(firebaseApp);
        } catch (e) { console.error(e); }

        const populateSelects = () => {
            const f = document.getElementById('form-et-name');
            const d = document.getElementById('details-et-filter');
            ET_LIST.forEach(et => {
                f.innerHTML += `<option value="${et}">${et}</option>`;
                d.innerHTML += `<option value="${et}">${et}</option>`;
            });
        };

        async function loadData() {
            if (!auth.currentUser || !db) return;
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'performance'));
                appData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                appData.sort((a, b) => new Date(b.date) - new Date(a.date));
                renderDashboard();
                updateTopET();
            } catch (e) { console.error(e); }
        }

        function renderDashboard() {
            const grid = document.getElementById('cards-grid');
            const selectedDate = document.getElementById('dashboard-date-picker').value;
            grid.innerHTML = '';

            ET_LIST.forEach(et => {
                const entry = appData.find(d => d.etName === et && d.date === selectedDate);

                if (!entry) {
                    grid.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl text-center flex flex-col justify-center h-56 border-dashed border-slate-700">
                            <div class="text-slate-600 mb-2">NO PERFORMANCE RECORD</div>
                            <h3 class="text-lg font-bold text-slate-400">${et}</h3>
                            <button onclick="openFormFor('${et}')" class="mt-4 text-xs font-bold text-indigo-400 hover:text-indigo-300">ADD PERFORMANCE</button>
                        </div>`;
                    return;
                }

                const isToday = entry.date === getTodayStr();
                const lowOR = entry.lowestOR < entry.threshold;
                const lowDel = entry.lowestDelivery < entry.threshold;
                const revStr = entry.revenue !== undefined ? `$${entry.revenue.toLocaleString()}` : '-';

                grid.innerHTML += `
                    <div class="glass-card p-6 rounded-[24px] group">
                        <div class="flex justify-between items-start mb-6">
                            <div>
                                <h3 class="text-2xl font-bold text-white">${entry.etName}</h3>
                                <p class="text-[11px] text-slate-500 font-black uppercase tracking-wider mt-1">${isToday ? 'LIVE' : formatDate(entry.date)}</p>
                            </div>
                            <button onclick="editPerformance('${entry.id}')" class="edit-link">Edit</button>
                        </div>
                        <div class="grid grid-cols-2 gap-y-6 gap-x-4 mb-6">
                            <div>
                                <p class="text-[10px] text-slate-500 font-black uppercase mb-1.5 tracking-widest">OR %</p>
                                <p class="text-base font-bold ${lowOR ? 'text-rose-400' : 'text-slate-200'}">${entry.lowestOR}% - ${entry.highestOR}%</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-500 font-black uppercase mb-1.5 tracking-widest">DEL %</p>
                                <p class="text-base font-bold ${lowDel ? 'text-rose-400' : 'text-slate-200'}">${entry.lowestDelivery}% - ${entry.highestDelivery}%</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-500 font-black uppercase mb-1.5 tracking-widest">OR MAILS DOWN</p>
                                <p class="text-base font-bold text-slate-200">${entry.orMailsDown || 0}</p>
                            </div>
                            <div>
                                <p class="text-[10px] text-slate-500 font-black uppercase mb-1.5 tracking-widest">REVENUE</p>
                                <p class="text-base font-bold text-emerald-400">${revStr}</p>
                            </div>
                        </div>
                        <div class="pt-4 border-t border-slate-700/50">
                            <p class="text-[10px] text-slate-500 font-black uppercase mb-1.5 tracking-widest">NOTES</p>
                            <p class="text-sm text-slate-300 leading-relaxed italic">${entry.notes || 'No notes available'}</p>
                        </div>
                    </div>`;
            });
        }

        function updateTopET() {
            const selectedDate = document.getElementById('dashboard-date-picker').value;
            const entries = appData.filter(d => d.date === selectedDate && d.revenue !== undefined);
            if (entries.length > 0) {
                const top = [...entries].sort((a, b) => (b.revenue || 0) - (a.revenue || 0))[0];
                document.getElementById('top-et-name').innerText = `${top.etName} ($${top.revenue.toLocaleString()})`;
                document.getElementById('top-revenue-badge').classList.remove('hidden');
            } else {
                document.getElementById('top-revenue-badge').classList.add('hidden');
            }
        }

        window.editPerformance = (id) => {
            const entry = appData.find(d => d.id === id);
            if (!entry) return;
            
            document.getElementById('form-et-name').value = entry.etName;
            document.getElementById('form-date').value = entry.date;
            document.getElementById('form-low-or').value = entry.lowestOR;
            document.getElementById('form-high-or').value = entry.highestOR;
            document.getElementById('form-low-del').value = entry.lowestDelivery;
            document.getElementById('form-high-del').value = entry.highestDelivery;
            document.getElementById('form-del-down').value = entry.mailsDown;
            document.getElementById('form-or-down').value = entry.orMailsDown;
            document.getElementById('form-revenue').value = entry.revenue || '';
            document.getElementById('form-threshold').value = entry.threshold;
            document.getElementById('form-notes').value = entry.notes || '';
            
            showView('form');
        };

        window.showView = (view) => {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.getElementById(`view-${view}`).classList.remove('hidden');
            if (view === 'details') renderDetails();
            window.scrollTo(0,0);
        };

        window.openFormFor = (et) => {
            document.getElementById('performance-form').reset();
            document.getElementById('form-et-name').value = et;
            document.getElementById('form-date').value = getTodayStr();
            showView('form');
        };

        window.viewDetailedET = (et) => {
            document.getElementById('details-et-filter').value = et;
            showView('details');
        };

        document.getElementById('performance-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.disabled = true; btn.innerText = 'SAVING...';
            
            const revenueVal = document.getElementById('form-revenue').value;
            const entry = {
                etName: document.getElementById('form-et-name').value, 
                date: document.getElementById('form-date').value,
                lowestOR: parseFloat(document.getElementById('form-low-or').value),
                highestOR: parseFloat(document.getElementById('form-high-or').value),
                lowestDelivery: parseFloat(document.getElementById('form-low-del').value),
                highestDelivery: parseFloat(document.getElementById('form-high-del').value),
                mailsDown: parseInt(document.getElementById('form-del-down').value),
                orMailsDown: parseInt(document.getElementById('form-or-down').value),
                revenue: revenueVal !== '' ? parseFloat(revenueVal) : undefined,
                threshold: parseFloat(document.getElementById('form-threshold').value),
                notes: document.getElementById('form-notes').value,
                createdAt: new Date().toISOString()
            };
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'performance', `${entry.etName}_${entry.date}`), entry);
                await loadData();
                showView('dashboard');
                e.target.reset();
            } catch (err) { console.error(err); }
            finally { btn.disabled = false; btn.innerText = 'Save Performance'; }
        });

        function renderDetails() {
            const et = document.getElementById('details-et-filter').value;
            const start = document.getElementById('details-start-date').value;
            const end = document.getElementById('details-end-date').value;
            
            let history = appData.filter(d => d.etName === et);
            if (start) history = history.filter(d => d.date >= start);
            if (end) history = history.filter(d => d.date <= end);
            
            history.sort((a,b) => new Date(a.date) - new Date(b.date));

            const stats = document.getElementById('today-detail-stats');
            const summaryEntry = history[history.length - 1];
            
            if (summaryEntry) {
                const rev = summaryEntry.revenue !== undefined ? `$${summaryEntry.revenue}` : '-';
                stats.innerHTML = `
                    <div class="bg-indigo-500/10 border border-indigo-500/20 p-4 rounded-xl"><p class="text-[10px] text-indigo-400 uppercase font-black tracking-widest">Revenue (Last Entry)</p><p class="text-2xl font-bold text-emerald-400">${rev}</p></div>
                    <div class="bg-slate-700/30 p-4 rounded-xl"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Avg OR (Period)</p><p class="text-lg font-bold">${summaryEntry.lowestOR}% - ${summaryEntry.highestOR}%</p></div>
                    <div class="bg-slate-700/30 p-4 rounded-xl"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Avg Del (Period)</p><p class="text-lg font-bold">${summaryEntry.lowestDelivery}% - ${summaryEntry.highestDelivery}%</p></div>
                    <div class="bg-slate-700/30 p-4 rounded-xl"><p class="text-[10px] text-slate-500 uppercase font-black tracking-widest">OR Mails Down</p><p class="text-xl font-bold">${summaryEntry.orMailsDown || 0}</p></div>`;
            } else { 
                stats.innerHTML = `<div class="col-span-4 py-8 text-center text-slate-500 font-bold border border-dashed border-slate-700 rounded-xl tracking-widest">NO DATA FOR THIS RANGE</div>`; 
            }

            const labels = history.map(d => formatDate(d.date));
            const datasets = [
                { id: 'chart-or', label: 'OR Range Avg', data: history.map(d => (d.lowestOR + d.highestOR)/2), color: '#6366f1' },
                { id: 'chart-delivery', label: 'Del Range Avg', data: history.map(d => (d.lowestDelivery + d.highestDelivery)/2), color: '#22c55e' },
                { id: 'chart-mails', label: 'OR Mails Down', data: history.map(d => d.orMailsDown || 0), color: '#f59e0b' },
                { id: 'chart-overall', label: 'Revenue Trend', data: history.map(d => d.revenue || 0), color: '#ec4899' }
            ];

            datasets.forEach(ds => {
                if (charts[ds.id]) charts[ds.id].destroy();
                charts[ds.id] = new Chart(document.getElementById(ds.id).getContext('2d'), {
                    type: 'line',
                    data: { labels, datasets: [{ data: ds.data, borderColor: ds.color, backgroundColor: ds.color+'15', fill: true, tension: 0.4 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { grid: { color: 'rgba(255,255,255,0.05)' } }, x: { grid: { display: false } } } }
                });
            });
        }

        window.addEventListener('load', async () => {
            const today = getTodayStr();
            document.getElementById('dashboard-date-picker').value = today;
            document.getElementById('form-date').value = today;
            
            const sevenDaysAgo = new Date();
            sevenDaysAgo.setDate(sevenDaysAgo.getDate() - 7);
            document.getElementById('details-start-date').value = sevenDaysAgo.toISOString().split('T')[0];
            document.getElementById('details-end-date').value = today;

            populateSelects();
            if (auth) {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => { if (user) loadData(); });
            }
        });
    </script>
</body>
</html>
